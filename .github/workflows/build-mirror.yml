name: Build Desktop Apps

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-build]
  push:
    tags:
      - 'v*'

env:
  PRIVATE_REPO_URL: https://github.com/jamiemkariuki/viusasa-desktop-app.git
  CHECKOUT_REF: ${{ github.event.client_payload.version || github.ref_name }}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: jamiemkariuki/viusasa-desktop-app
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      
      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == *refs/tags/* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            PKG_VER=$(node -e "console.log(require('./package.json').version)")
            echo "VERSION=v${PKG_VER}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: jamiemkariuki/viusasa-desktop-app
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      
      - name: Show Version Info
        run: |
          echo "Building version: ${{ needs.prepare.outputs.version }} (from ref: ${{ env.CHECKOUT_REF }})"
          echo "Package version: $(node -e "console.log(require('./package.json').version)")"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Windows
        run: npm run build:win -- --publish never
      
      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: viusasa-windows-x64
          path: dist/*.zip
      
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: viusasa-windows-installer
          path: dist/*.msi

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: jamiemkariuki/viusasa-desktop-app
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      
      - name: Show Version Info
        run: |
          echo "Building version: ${{ needs.prepare.outputs.version }} (from ref: ${{ env.CHECKOUT_REF }})"
          echo "Package version: $(node -e "console.log(require('./package.json').version)")"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build macOS
        run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      
      - name: Remove Quarantine
        run: |
          [ -d "dist/mac/Viusasa.app" ] && xattr -cr dist/mac/Viusasa.app 2>/dev/null || true
          [ -d "dist/mac-arm64/Viusasa.app" ] && xattr -cr dist/mac-arm64/Viusasa.app 2>/dev/null || true
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: viusasa-macos
          path: dist/*.dmg
      
      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: viusasa-macos-zip
          path: dist/*.zip

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: jamiemkariuki/viusasa-desktop-app
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      
      - name: Show Version Info
        run: |
          echo "Building version: ${{ needs.prepare.outputs.version }} (from ref: ${{ env.CHECKOUT_REF }})"
          echo "Package version: $(node -e "console.log(require('./package.json').version)")"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Linux
        run: npm run build:linux -- --publish never
      
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: viusasa-linux
          path: dist/*.AppImage

  create-release:
    needs: [prepare, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          files: |
            artifacts/viusasa-windows-x64/*.zip
            artifacts/viusasa-windows-installer/*.msi
            artifacts/viusasa-macos/*.dmg
            artifacts/viusasa-macos-zip/*.zip
            artifacts/viusasa-linux/*.AppImage
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
